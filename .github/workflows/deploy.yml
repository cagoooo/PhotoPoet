name: Deploy to Firebase

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '.gitignore'
      - '.env.example'
  workflow_dispatch:

concurrency:
  group: firebase-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy hosting + functions
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install root deps
        run: npm ci

      - name: Install functions deps
        run: npm ci --prefix functions || npm install --prefix functions

      - name: Build Next.js (static export)
        run: npm run build

      - name: Build Cloud Functions
        run: npm run build --prefix functions

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Deploy hosting + functions
        run: |
          firebase deploy \
            --only hosting,functions \
            --project=photopoet-ha364 \
            --non-interactive \
            --force

      - name: Print live URL
        run: echo "🌐 Live → https://photopoet-ha364.web.app"
